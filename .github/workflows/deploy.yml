name: Deploy Gestor Financeiro

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Build and Deploy
    runs-on: self-hosted
    environment: dev

    env:
      # Docker remoto
      DOCKER_HOST: ${{ secrets.DOCKER_HOST }}

      # DATABASE
      DB_URL: ${{ secrets.DB_URL }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      # EMAIL
      EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
      EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
      EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}

      # AWS
      AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Extrair Versão do Projeto
        id: version
        run: |
          VERSION=$(awk '/<artifactId>gestor-financeiro<\/artifactId>/{getline; print}' pom.xml | grep -oP '(?<=<version>)[^<]+' || echo "1.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "🚀 Versão detectada: $VERSION"

      - name: Verificar Instalação do Docker
        run: |
          if ! command -v docker &> /dev/null; then
            echo "Instalando cliente Docker no Runner..."
            sudo apt-get update
            sudo apt-get install -y docker.io docker-compose-plugin
          fi

      - name: Verificar conexão com Docker remoto
        run: |
          echo "🐳 Docker Host: $DOCKER_HOST"
          docker version
          docker ps

      - name: Preparar Ambiente (.env)
        run: |
          echo "=== Gerando arquivo .env para o deploy ==="

          # DATABASE
          echo "DB_URL=${{ secrets.DB_URL }}" > .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env

          # EMAIL
          echo "EMAIL_HOST=${{ secrets.EMAIL_HOST }}" >> .env
          echo "EMAIL_PORT=${{ secrets.EMAIL_PORT }}" >> .env
          echo "EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}" >> .env

          # AWS
          echo "AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}" >> .env
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
          echo "AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}" >> .env
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
          echo "AWS_REGION=${{ secrets.AWS_REGION }}" >> .env

          echo "✅ Arquivo .env gerado com sucesso."

      - name: Executar Script de Deploy
        run: |
          echo "🚀 Iniciando deploy da versão ${{ steps.version.outputs.version }}..."

          chmod +x deploy.sh

          export DB_URL="${{ secrets.DB_URL }}"
          export DB_USERNAME="${{ secrets.DB_USERNAME }}"
          export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"

          export EMAIL_HOST="${{ secrets.EMAIL_HOST }}"
          export EMAIL_PORT="${{ secrets.EMAIL_PORT }}"
          export EMAIL_SENDER="${{ secrets.EMAIL_SENDER }}"

          export AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}"
          export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          export AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          export AWS_REGION="${{ secrets.AWS_REGION }}"

          ./deploy.sh

      - name: Limpeza Pós-Deploy
        if: always()
        run: |
          echo "🧹 Limpando imagens órfãs..."
          docker image prune -af

          echo "🗑️ Removendo arquivo .env..."
          rm -f .env
