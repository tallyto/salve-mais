name: Deploy to Proxmox Docker LXC

on:
  push:
    branches:
      - master  # ou 'main', verifique o nome da sua branch principal

jobs:
  deploy:
    name: Build and Deploy
    runs-on: self-hosted  # Rodará na sua LXC com o Runner
    
    env:
      # CONFIGURAÇÃO CRUCIAL: IP da sua LXC com Docker e a porta que você expôs (padrão 2375)
      DOCKER_HOST: "tcp://192.168.0.105:2375" 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(awk '/<artifactId>gestor-financeiro<\/artifactId>/{getline; print}' pom.xml | grep -oP '(?<=<version>)[^<]+' || echo "1.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "🚀 Preparando deploy da versão: $VERSION"

      - name: Verify Docker Connection
        run: |
          echo "Tentando conectar ao Docker em $DOCKER_HOST..."
          docker info | grep "Name" || (echo "❌ Erro: Não foi possível conectar na LXC do Docker. Verifique o IP e se o Docker está exposto via TCP." && exit 1)

      - name: Execute Deploy Script
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Garante que o script tenha permissão de execução
          chmod +x deploy.sh
          
          echo "=== Iniciando Deploy Remoto ==="
          # O comando será executado pelo Runner, mas enviado para o Docker da outra LXC
          ./deploy.sh
          
          echo "✅ Deploy da versão $VERSION concluído com sucesso!"

      - name: Cleanup old images
        if: always()
        run: |
          echo "Limpando imagens antigas na LXC remota..."
          docker image prune -f
