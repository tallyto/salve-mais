name: Deploy Gestor Financeiro

on:
  push:
    branches:
      - master  # Certifique-se de que sua branch principal é master ou main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: self-hosted
    environment: dev  # Usa o ambiente 'dev' que você configurou no GitHub

    env:
      # Se você configurou o /etc/hosts, pode usar: tcp://docker.proxmox.local:2375
      DOCKER_HOST: "tcp://192.168.0.105:2375"
      
      # Mapeamento das Secrets para o ambiente do Shell do Runner
      DB_URL: ${{ secrets.DB_URL }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
      EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
      EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Extrair Versão do Projeto
        id: version
        run: |
          VERSION=$(awk '/<artifactId>gestor-financeiro<\/artifactId>/{getline; print}' pom.xml | grep -oP '(?<=<version>)[^<]+' || echo "1.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "🚀 Versão detectada: $VERSION"

      - name: Verificar Instalação do Docker
        run: |
          if ! command -v docker &> /dev/null; then
            echo "Instalando cliente Docker no Runner..."
            sudo apt-get update && sudo apt-get install -y docker.io
          fi

      - name: Preparar Ambiente (.env)
        run: |
          echo "=== Gerando arquivo .env para o deploy ==="
          # Cria o arquivo .env que o seu deploy.sh e o docker-compose exigem
          echo "DB_URL=${{ secrets.DB_URL }}" > .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "EMAIL_HOST=${{ secrets.EMAIL_HOST }}" >> .env
          echo "EMAIL_PORT=${{ secrets.EMAIL_PORT }}" >> .env
          echo "EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}" >> .env
          echo "✅ Arquivo .env gerado com sucesso."

      - name: Executar Script de Deploy
        run: |
          echo "Iniciando deploy da versão ${{ steps.version.outputs.version }}..."
          chmod +x deploy.sh
          ./deploy.sh

      - name: Limpeza Pós-Deploy
        if: always()
        run: |
          echo "Limpando imagens órfãs na LXC remota..."
          docker image prune -f
          # Opcional: remover o .env por segurança após o uso
          rm .env
